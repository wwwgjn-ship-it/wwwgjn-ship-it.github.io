---
layout: default
title: Home
---

<h1 class="page-title">Our Films</h1>

<div class="movie-grid">
    {% assign sorted = site.data.movies | sort: "id" %}
    {% for movie in sorted %}
        <div class="movie-card">
            <a href="/movies/{{ movie.file }}.html">
                <img
                    src="/asstes/image/format=auto,quality=70,width=450/assets/images/{{ movie.poster }}"
                    alt="{{ movie.title }}"
                >
                <div class="movie-title">{{ movie.title }}</div>
            </a>
        </div>
    {% endfor %}
</div>
