---
layout: default
title: Home
---

<h1 style="text-align:center; margin-bottom: 40px; color: #ffffff;">
    Our Films
</h1>

<div class="movie-grid">
    {% assign movies = site.movies | sort: "order" %}
    {% for movie in movies %}
        <div class="movie-card">
            <a href="{{ movie.url }}">
                <img src="/assets/images/{{ movie.poster }}" alt="{{ movie.title }}">
                <div class="movie-title">{{ movie.title }}</div>
            </a>
        </div>
    {% endfor %}
</div>

<style>
/* 整体暗色影院风 */
body {
    background-color: #0b0b0b;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
}

/* 网格布局 */
.movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 30px;
    padding: 20px 40px;
}

/* 卡片样式 */
.movie-card {
    background: #111111;
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    text-align: center;
}

/* 悬停效果 */
.movie-card:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 30px rgba(255, 255, 255, 0.18);
}

/* 海报样式 */
.movie-card img {
    width: 100%;
    height: auto;
    display: block;
}

/* 电影标题 */
.movie-title {
    padding: 12px;
    font-size: 1rem;
    font-weight: 600;
    color: #ffffff;
    background: #111111;
}
</style>
