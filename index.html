---
layout: default
title: Home
---

<h1 style="text-align:center; margin-bottom: 30px;">
    Our Films
</h1>

<div class="movie-grid">
    {% for movie in site.movies %}
        <div class="movie-card">
            <a href="{{ movie.url }}">
                <img src="/assets/images/{{ movie.poster }}" alt="{{ movie.title }}">
                <div class="movie-title">{{ movie.title }}</div>
            </a>
        </div>
    {% endfor %}
</div>
